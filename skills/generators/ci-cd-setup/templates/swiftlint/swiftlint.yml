# Base SwiftLint config — generated by ci-cd-setup.
#
# Skill-shipped rule fragments: skills in claude-code-apple-skills may carry
# a rules/swiftlint.yml fragment (opt_in_rules + custom_rules). Merge each
# relevant fragment into this file: append its custom_rules entries under
# custom_rules below and union its opt_in_rules list. /apple:review also
# offers to install rules it graduates from findings.

excluded:
  - .build
  - DerivedData
  - "**/Generated"

opt_in_rules:
  - force_unwrapping
  - force_try
  - empty_count

# Keep the default rule set otherwise; disable case-by-case with reasons.
disabled_rules: []

custom_rules: {}
  # Merged fragments land here — e.g. from
  # skills/security/rules/swiftlint.yml (hardcoded_secret_literal),
  # skills/ios/coding-best-practices/rules/swiftlint.yml (print_in_production,
  # observable_object_legacy — iOS 17+/macOS 14+ targets only),
  # skills/testing/tdd-feature/rules/swiftlint.yml (xctest_in_unit_tests —
  # scoped to unit-test paths; XCUITest legitimately needs XCTest),
  # skills/swift/concurrency/rules/swiftlint.yml (unchecked_sendable).
